<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Class Diagram Sesudah Refactoring - Rancangan Refactoring</title>
  <desc id="desc">Diagram visual fallback yang menggambarkan pemisahan route, controller, service, repository, validator, view, dan database.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#444"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111; }
      .box { fill: #f7f7f7; stroke: #333; stroke-width: 1.5; rx: 8; }
      .service { fill: #eef8f1; stroke: #2d7a46; stroke-width: 1.5; rx: 8; }
      .repo { fill: #eef5ff; stroke: #2b5f9e; stroke-width: 1.5; rx: 8; }
      .head { font: 700 14px Arial, sans-serif; fill: #111; }
      .body { font: 12px Arial, sans-serif; fill: #222; }
      .edge { stroke: #444; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .label { font: 11px Arial, sans-serif; fill: #444; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="#fff"/>
  <text x="640" y="34" text-anchor="middle" class="title">Class Diagram Sesudah Refactoring - Rancangan Refactoring</text>

  <rect class="box" x="40" y="120" width="205" height="105"/>
  <text class="head" x="142" y="147" text-anchor="middle">App Bootstrap</text>
  <text class="body" x="58" y="175">+ middleware config</text>
  <text class="body" x="58" y="195">+ mount routes</text>
  <text class="body" x="58" y="215">+ scheduler</text>

  <rect class="box" x="315" y="70" width="220" height="90"/>
  <text class="head" x="425" y="97" text-anchor="middle">DashboardRoutes</text>
  <text class="body" x="333" y="125">+ map dashboard URL</text>
  <text class="body" x="333" y="145">+ call controller</text>

  <rect class="box" x="315" y="190" width="220" height="90"/>
  <text class="head" x="425" y="217" text-anchor="middle">ApiRoutes</text>
  <text class="body" x="333" y="245">+ service/user/API key</text>
  <text class="body" x="333" y="265">+ status endpoint</text>

  <rect class="box" x="315" y="310" width="220" height="90"/>
  <text class="head" x="425" y="337" text-anchor="middle">GatewayRoutes</text>
  <text class="body" x="333" y="365">+ routing_api</text>
  <text class="body" x="333" y="385">+ proxy route</text>

  <rect class="box" x="610" y="55" width="230" height="110"/>
  <text class="head" x="725" y="82" text-anchor="middle">DashboardController</text>
  <text class="body" x="628" y="110">+ overview()</text>
  <text class="body" x="628" y="130">+ analytics()</text>
  <text class="body" x="628" y="150">+ render view model</text>

  <rect class="box" x="610" y="195" width="230" height="110"/>
  <text class="head" x="725" y="222" text-anchor="middle">Service/API Key Controllers</text>
  <text class="body" x="628" y="250">+ CRUD service</text>
  <text class="body" x="628" y="270">+ API key lifecycle</text>
  <text class="body" x="628" y="290">+ health test</text>

  <rect class="box" x="610" y="335" width="230" height="110"/>
  <text class="head" x="725" y="362" text-anchor="middle">GatewayController</text>
  <text class="body" x="628" y="390">+ getRoutes()</text>
  <text class="body" x="628" y="410">+ validateRequest()</text>
  <text class="body" x="628" y="430">+ proxy()</text>

  <rect class="service" x="915" y="40" width="245" height="120"/>
  <text class="head" x="1037" y="67" text-anchor="middle">DashboardService</text>
  <text class="body" x="933" y="95">+ compose overview data</text>
  <text class="body" x="933" y="115">+ compose analytics data</text>
  <text class="body" x="933" y="135">+ export CSV rows</text>

  <rect class="service" x="915" y="195" width="245" height="130"/>
  <text class="head" x="1037" y="222" text-anchor="middle">Health/Revenue Services</text>
  <text class="body" x="933" y="250">+ test service URL</text>
  <text class="body" x="933" y="270">+ record health history</text>
  <text class="body" x="933" y="290">+ calculate and record fee</text>

  <rect class="service" x="915" y="360" width="245" height="145"/>
  <text class="head" x="1037" y="387" text-anchor="middle">GatewayProxyService</text>
  <text class="body" x="933" y="415">+ validate scope</text>
  <text class="body" x="933" y="435">+ apply idempotency</text>
  <text class="body" x="933" y="455">+ forward request</text>
  <text class="body" x="933" y="475">+ coordinate fee and logs</text>

  <rect class="repo" x="610" y="560" width="250" height="145"/>
  <text class="head" x="735" y="587" text-anchor="middle">Repository Layer</text>
  <text class="body" x="628" y="615">+ ServiceRepository</text>
  <text class="body" x="628" y="635">+ RequestLogRepository</text>
  <text class="body" x="628" y="655">+ RevenueRepository</text>
  <text class="body" x="628" y="675">+ ApiKeyRepository</text>

  <rect class="repo" x="940" y="585" width="240" height="100"/>
  <text class="head" x="1060" y="612" text-anchor="middle">Database Tables</text>
  <text class="body" x="958" y="640">users, employees, services</text>
  <text class="body" x="958" y="660">logs, revenue, api_keys</text>

  <rect class="box" x="315" y="560" width="220" height="110"/>
  <text class="head" x="425" y="587" text-anchor="middle">Validator/Helper Layer</text>
  <text class="body" x="333" y="615">+ UrlSafetyValidator</text>
  <text class="body" x="333" y="635">+ ScopeValidator</text>
  <text class="body" x="333" y="655">+ DateRange/Csv helpers</text>

  <rect class="box" x="40" y="510" width="205" height="120"/>
  <text class="head" x="142" y="537" text-anchor="middle">View Layer</text>
  <text class="body" x="58" y="565">+ dashboard partials</text>
  <text class="body" x="58" y="585">+ services.ejs</text>
  <text class="body" x="58" y="605">+ analytics.ejs</text>

  <path class="edge" d="M245 155 L315 115"/>
  <path class="edge" d="M245 174 L315 235"/>
  <path class="edge" d="M245 195 C280 260 295 320 315 355"/>
  <path class="edge" d="M535 115 L610 110"/>
  <path class="edge" d="M535 235 L610 250"/>
  <path class="edge" d="M535 355 L610 390"/>
  <path class="edge" d="M840 110 L915 100"/>
  <path class="edge" d="M840 250 L915 260"/>
  <path class="edge" d="M840 390 L915 430"/>
  <path class="edge" d="M915 455 C835 505 790 535 760 560"/>
  <path class="edge" d="M1037 325 C1000 470 870 545 790 585"/>
  <path class="edge" d="M1037 160 C1000 300 850 520 760 560"/>
  <path class="edge" d="M860 635 L940 635"/>
  <path class="edge" d="M915 430 C720 470 550 535 495 560"/>
  <path class="edge" d="M610 120 C450 215 285 430 185 510"/>
  <text class="label" x="690" y="735">SQL dipusatkan di repository, controller berkomunikasi melalui service domain.</text>
</svg>
